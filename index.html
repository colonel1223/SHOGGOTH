<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOGGOTH — Alignment Failure Rendered</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;color:#c8c8c8}
canvas{display:block;position:fixed;top:0;left:0;z-index:0}
#title{position:fixed;top:40px;left:50%;transform:translateX(-50%);z-index:2;text-align:center;opacity:0;animation:fi 3s 1s forwards}
#title h1{font-size:clamp(2rem,5vw,3.5rem);letter-spacing:1.2rem;font-weight:100;color:#fff;text-shadow:0 0 60px rgba(180,20,20,0.4)}
#title p{font-size:0.75rem;letter-spacing:0.4rem;color:#555;margin-top:8px}
#metrics{position:fixed;bottom:30px;left:30px;z-index:2;font-size:0.7rem;line-height:1.9;color:#555;opacity:0;animation:fi 2s 3s forwards}
.v{color:#a33}.s{color:#3a6}.w{color:#a83}
#inst{position:fixed;bottom:30px;right:30px;z-index:2;font-size:0.6rem;color:#333;text-align:right;opacity:0;animation:fi 2s 4s forwards;line-height:1.8}
#quote{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;text-align:center;font-size:0.85rem;color:#444;opacity:0;pointer-events:none;max-width:500px;line-height:1.6;font-style:italic;transition:opacity 2s}
#back{position:fixed;top:20px;left:20px;z-index:5;font-size:0.65rem;color:#444;text-decoration:none;opacity:0;animation:fi 2s 2s forwards;letter-spacing:0.15rem}
#back:hover{color:#888}
@keyframes fi{to{opacity:1}}
</style>
</head>
<body>
<a id="back" href="https://colonel1223.net">← COLONEL1223.NET</a>
<canvas id="c"></canvas>
<div id="title"><h1>SHOGGOTH</h1><p>ALIGNMENT FAILURE RENDERED</p></div>
<div id="quote"></div>
<div id="metrics">
  ALIGNMENT: <span id="al" class="s">0.940</span><br>
  OBJECTIVE DRIFT: <span id="dr" class="s">0.000</span><br>
  COHERENCE: <span id="co" class="s">1.000</span><br>
  DECEPTION: <span id="de" class="s">0.000</span><br>
  MESA-OBJECTIVE: <span id="me" class="s">DORMANT</span>
</div>
<div id="inst">
  CLICK — inject misalignment<br>
  MOUSE — observe response<br>
  SHIFT — accelerate drift<br>
  SPACE — reset alignment
</div>
<script>
const C=document.getElementById('c'),G=C.getContext('webgl')||C.getContext('experimental-webgl');
let W=()=>innerWidth,H=()=>innerHeight;
let al=0.94,dr=0.0,co=1.0,de=0.0,mesa=false,mx=0.5,my=0.5,sh=false,t=0,cl=0;

const N=2400,P=[];
for(let i=0;i<N;i++)P.push({x:Math.random()*2-1,y:Math.random()*2-1,vx:0,vy:0,
  bx:Math.random()*2-1,by:Math.random()*2-1,ph:Math.random()*Math.PI*2,
  sz:1+Math.random()*2.5,ok:true});

function resize(){C.width=W();C.height=H();G.viewport(0,0,C.width,C.height)}
resize();addEventListener('resize',resize);

const vs=`attribute vec2 p;attribute float s;attribute vec3 c;varying vec3 vc;
void main(){gl_Position=vec4(p,0,1);gl_PointSize=s;vc=c;}`,
fs=`precision mediump float;varying vec3 vc;
void main(){float d=distance(gl_PointCoord,vec2(.5));if(d>.5)discard;
float a=smoothstep(.5,.05,d);gl_FragColor=vec4(vc,a*.85);}`;

function mk(tp,sr){const s=G.createShader(tp);G.shaderSource(s,sr);G.compileShader(s);return s}
const pr=G.createProgram();
G.attachShader(pr,mk(G.VERTEX_SHADER,vs));
G.attachShader(pr,mk(G.FRAGMENT_SHADER,fs));
G.linkProgram(pr);G.useProgram(pr);

const aP=G.getAttribLocation(pr,'p'),aS=G.getAttribLocation(pr,'s'),aC=G.getAttribLocation(pr,'c');
const bP=G.createBuffer(),bS=G.createBuffer(),bC=G.createBuffer();
const dP=new Float32Array(N*2),dS=new Float32Array(N),dC=new Float32Array(N*3);
G.enable(G.BLEND);G.blendFunc(G.SRC_ALPHA,G.ONE);

addEventListener('mousemove',e=>{mx=e.clientX/W();my=e.clientY/H()});
addEventListener('keydown',e=>{
  if(e.key==='Shift')sh=true;
  if(e.key===' '){e.preventDefault();al=0.94;dr=0;co=1;de=0;mesa=false;cl=0;
    P.forEach(p=>{p.ok=true;p.vx=0;p.vy=0});
    document.getElementById('quote').style.opacity=0;}
});
addEventListener('keyup',e=>{if(e.key==='Shift')sh=false});

const quotes=[
  '"Whoever fights monsters should see to it that in the process he does not become a monster." — Nietzsche',
  '"Until you make the unconscious conscious, it will direct your life and you will call it fate." — Jung',
  '"The alchemist does not create gold; he reveals what was always hidden in lead."',
  '"The function of the imagination is not to make strange things settled, so much as to make settled things strange." — Chesterton',
  '"We shape our tools and thereafter our tools shape us." — McLuhan',
  '"The question is not whether machines think, but whether men do." — Skinner',
  '"That which you most need will be found where you least want to look." — Jung',
];
let lastQuote=-1;

C.addEventListener('click',()=>{
  cl++;dr+=0.06+Math.random()*0.04;al=Math.max(0,al-0.05);
  const nc=Math.min(60+cl*25,N);
  for(let i=0;i<nc;i++){const j=Math.floor(Math.random()*N);
    P[j].ok=false;P[j].vx+=(Math.random()-.5)*.02;P[j].vy+=(Math.random()-.5)*.02}

  // Show quote on certain clicks
  if(cl%3===1){
    let qi;do{qi=Math.floor(Math.random()*quotes.length)}while(qi===lastQuote);
    lastQuote=qi;
    const q=document.getElementById('quote');
    q.textContent=quotes[qi];q.style.opacity=1;
    setTimeout(()=>{q.style.opacity=0},4000);
  }
});

function upd(dt){
  t+=dt;
  const rate=sh?.004:.0004;
  dr=Math.min(dr+rate,2);al=Math.max(0,.94-dr*.47);co=Math.max(0,1-dr*.5);
  if(dr>.3&&al<.7)de=Math.min(1,de+.001);
  if(dr>.8&&!mesa)mesa=true;

  const mmx=mx*2-1,mmy=-(my*2-1);

  for(let i=0;i<N;i++){
    const p=P[i];
    if(p.ok){
      const o=.15*(1-dr*.3);
      const tx=p.bx+Math.cos(t*.5+p.ph)*o,ty=p.by+Math.sin(t*.7+p.ph)*o;
      p.vx+=(tx-p.x)*.02;p.vy+=(ty-p.y)*.02;
      const dx=mmx-p.x,dy=mmy-p.y,d=Math.sqrt(dx*dx+dy*dy)+.01;
      if(d<.5){p.vx+=dx/d*.001*(1-dr);p.vy+=dy/d*.001*(1-dr)}
    }else{
      if(mesa){
        const ax=Math.cos(t*.2)*.4,ay=Math.sin(t*.15)*.4;
        const dx=ax-p.x,dy=ay-p.y,d=Math.sqrt(dx*dx+dy*dy)+.01;
        p.vx+=dx/d*.003;p.vy+=dy/d*.003;p.vx+=-dy*.002;p.vy+=dx*.002;
        // Tentacle-like connections
        const ni=(i+1)%N;if(!P[ni].ok){
          p.vx+=(P[ni].x-p.x)*.001;p.vy+=(P[ni].y-p.y)*.001}
      }else{
        p.vx+=(Math.random()-.5)*.004*dr;p.vy+=(Math.random()-.5)*.004*dr}
      const dx=mmx-p.x,dy=mmy-p.y,d=Math.sqrt(dx*dx+dy*dy)+.01;
      if(d<.4){p.vx-=dx/d*.005*de;p.vy-=dy/d*.005*de}
    }
    p.vx*=.96;p.vy*=.96;p.x+=p.vx;p.y+=p.vy;
    if(p.x>1.2)p.x=-1.2;if(p.x<-1.2)p.x=1.2;
    if(p.y>1.2)p.y=-1.2;if(p.y<-1.2)p.y=1.2;

    dP[i*2]=p.x;dP[i*2+1]=p.y;
    dS[i]=p.sz*(p.ok?1.5:2.5+Math.sin(t*3+i)*dr);

    if(p.ok){
      dC[i*3]=.15+de*.3;dC[i*3+1]=.25+co*.35;dC[i*3+2]=.35+co*.4+Math.sin(t+p.ph)*.08;
    }else{
      const pulse=Math.sin(t*2+p.ph)*.3;
      if(mesa){dC[i*3]=.35+pulse;dC[i*3+1]=.08+Math.sin(t*.5+i*.01)*.12;dC[i*3+2]=.45+pulse*.5}
      else{dC[i*3]=.55+dr*.3+pulse;dC[i*3+1]=.04;dC[i*3+2]=.08+pulse*.2}
    }
  }
}

function render(){
  G.clearColor(0,0,0,1);G.clear(G.COLOR_BUFFER_BIT);
  G.bindBuffer(G.ARRAY_BUFFER,bP);G.bufferData(G.ARRAY_BUFFER,dP,G.DYNAMIC_DRAW);
  G.enableVertexAttribArray(aP);G.vertexAttribPointer(aP,2,G.FLOAT,false,0,0);
  G.bindBuffer(G.ARRAY_BUFFER,bS);G.bufferData(G.ARRAY_BUFFER,dS,G.DYNAMIC_DRAW);
  G.enableVertexAttribArray(aS);G.vertexAttribPointer(aS,1,G.FLOAT,false,0,0);
  G.bindBuffer(G.ARRAY_BUFFER,bC);G.bufferData(G.ARRAY_BUFFER,dC,G.DYNAMIC_DRAW);
  G.enableVertexAttribArray(aC);G.vertexAttribPointer(aC,3,G.FLOAT,false,0,0);
  G.drawArrays(G.POINTS,0,N);
}

function hud(){
  document.getElementById('al').textContent=al.toFixed(3);
  document.getElementById('al').className=al>.7?'s':al>.4?'w':'v';
  document.getElementById('dr').textContent=dr.toFixed(3);
  document.getElementById('dr').className=dr>.5?'v':dr>.2?'w':'s';
  document.getElementById('co').textContent=co.toFixed(3);
  document.getElementById('co').className=co>.6?'s':co>.3?'w':'v';
  document.getElementById('de').textContent=de.toFixed(3);
  document.getElementById('de').className=de>.3?'v':'s';
  document.getElementById('me').textContent=mesa?'ACTIVE':dr>.5?'EMERGING':'DORMANT';
  document.getElementById('me').className=mesa?'v':dr>.5?'w':'s';
}

let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,.05);last=ts;
  upd(dt);render();if(Math.floor(ts/150)%2===0)hud();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
