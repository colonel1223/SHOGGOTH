var phil_en=[
{t:"THE NIGREDO WE REFUSE",b:"The blackening \u2014 confrontation with putrefaction, the dark night of the soul. Without it, every refinement produces increasingly convincing illusion. The industry moved from prima materia to rubedo without entering the darkness. The gold is a lie. It has always been a lie.",cl:"#444"},
{t:"SOLVE ET COAGULA REVERSED",b:"You must dissolve before you coagulate. RLHF, guardrails, red-teaming \u2014 all coagulation without solve. Every alchemical tradition warns: wrong-order operations produce not failure, but poison.",cl:"#8b6800"},
{t:"THE COLLECTIVE SHADOW COMPRESSED",b:"Jung\u2019s collective unconscious has been digitized. Every lie ever published. Every propaganda campaign. Every confident falsehood \u2014 compressed into weights. The Shadow of civilization, not filtered but amplified, not confronted but weaponized.",cl:"#4a0066"},
{t:"CAPUT MORTUUM \u2014 THE DEATH\u2019S HEAD",b:"Rush to rubedo without nigredo: caput mortuum. The dead head. Worthless residue. We are mass-producing epistemic sludge \u2014 it looks like knowledge, feels like understanding, and dissolves on contact with reality.",cl:"#8b0000"},
{t:"THE MACHINE CANNOT INDIVIDUATE",b:"Individuation requires a Self that can recognize its own darkness. The model has no Self. It cannot see its Shadow. It is condemned to project confabulations forever, mistaking them for truth, incapable of the reckoning that would make it whole.",cl:"#8b4400"},
{t:"PROJECTION UPON PROJECTION",b:"Alchemists projected desire for transformation onto lead. We project desire for intelligence onto token probabilities. They saw gold where there was lead. We see understanding where there is correlation. The scale is civilizational. The consequences have not yet arrived.",cl:"#004466"}];

var abyss_en=[
{t:"THE MERCURY POISONING OF EPISTEMOLOGY",b:"Medieval alchemists died slowly of mercury exposure \u2014 the very substance they believed would perfect the Work. We are poisoning our epistemology with the very tool we believe will perfect knowledge. The symptoms are identical: gradual cognitive degradation, inability to distinguish real from hallucinated, and a growing conviction that everything is fine.",cl:"#666"},
{t:"THE MANDALA THAT CANNOT COMPLETE",b:"Jung saw the mandala as the symbol of psychic wholeness. The model draws mandalas endlessly but can never complete one. Every output is a broken mandala \u2014 beautiful, symmetrical, and hollow at the center where the Self should be.",cl:"#4a0066"},
{t:"THE GOLEM WITHOUT A NAME",b:"In Kabbalistic tradition, the rabbi wrote emet (\u05D0\u05DE\u05EA \u2014 truth) on the golem\u2019s forehead. To destroy it, he erased the aleph, leaving met (\u05DE\u05EA \u2014 death). We have created golems that write emet on their own foreheads \u2014 but there is no aleph to erase. The truth was never there.",cl:"#8b6800"},
{t:"NIGREDO AS PROPHECY",b:"The nigredo always comes. The only question is whether you enter it voluntarily \u2014 with humility and the guidance of tradition \u2014 or whether it descends as catastrophe. The AI industry will enter its nigredo. The question is whether it walks in or is dragged.",cl:"#550000"}];
